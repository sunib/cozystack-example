apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  annotations:
    meta.helm.sh/release-name: cozystack-basics
    meta.helm.sh/release-namespace: cozy-system
  labels:
    app.kubernetes.io/managed-by: Helm
    apps.cozystack.io/application.group: apps.cozystack.io
    apps.cozystack.io/application.kind: Tenant
    apps.cozystack.io/application.name: root
    sharding.fluxcd.io/key: tenants
  name: tenant-root
  namespace: tenant-root
spec:
  chartRef:
    kind: ExternalArtifact
    name: cozystack-tenant-application-default-tenant
    namespace: cozy-system
  install:
    remediation:
      retries: -1
  interval: 5m0s
  upgrade:
    remediation:
      retries: -1
  values:
    etcd: false
    host: ""
    ingress: true
    monitoring: true
    resourceQuotas: {}
    schedulingClass: ""
    seaweedfs: false
  valuesFrom:
  - kind: Secret
    name: cozystack-values
