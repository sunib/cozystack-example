apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  labels:
    apps.cozystack.io/application.group: apps.cozystack.io
    apps.cozystack.io/application.kind: Ingress
    apps.cozystack.io/application.name: ingress
    internal.cozystack.io/tenantmodule: "true"
    sharding.fluxcd.io/key: tenants
  name: ingress
  namespace: tenant-root
spec:
  chartRef:
    kind: ExternalArtifact
    name: cozystack-ingress-application-default-ingress
    namespace: cozy-system
  install:
    remediation:
      retries: -1
  interval: 5m0s
  upgrade:
    remediation:
      retries: -1
  values:
    cloudflareProxy: false
    replicas: 3
    resources: {}
    resourcesPreset: t1.micro
    whitelist: []
  valuesFrom:
  - kind: Secret
    name: cozystack-values
