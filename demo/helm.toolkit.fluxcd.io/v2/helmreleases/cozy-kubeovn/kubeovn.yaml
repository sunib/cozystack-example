apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  labels:
    cozystack.io/package: cozystack.networking
    cozystack.io/privileged: "true"
  name: kubeovn
  namespace: cozy-kubeovn
spec:
  chartRef:
    kind: ExternalArtifact
    name: cozystack-networking-kubeovn-cilium-kubeovn
    namespace: cozy-system
  dependsOn:
  - name: cilium
    namespace: cozy-cilium
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 30s
    timeout: 10m0s
  interval: 5m0s
  maxHistory: 5
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 30s
    timeout: 10m0s
  values:
    kube-ovn:
      ipv4:
        JOIN_CIDR: 100.64.0.0/16
        POD_CIDR: 10.244.0.0/16
        POD_GATEWAY: 10.244.0.1
        SVC_CIDR: 10.96.0.0/16
  valuesFrom:
  - kind: Secret
    name: cozystack-values
