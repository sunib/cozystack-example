apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  labels:
    cozystack.io/package: cozystack.kubeovn-webhook
    cozystack.io/privileged: "true"
  name: kubeovn-webhook
  namespace: cozy-kubeovn
spec:
  chartRef:
    kind: ExternalArtifact
    name: cozystack-kubeovn-webhook-default-kubeovn-webhook
    namespace: cozy-system
  dependsOn:
  - name: cert-manager-crds
    namespace: cozy-cert-manager
  - name: cert-manager
    namespace: cozy-cert-manager
  - name: cert-manager-issuers
    namespace: cozy-cert-manager
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 30s
    timeout: 10m0s
  interval: 5m0s
  maxHistory: 5
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 30s
    timeout: 10m0s
  valuesFrom:
  - kind: Secret
    name: cozystack-values
