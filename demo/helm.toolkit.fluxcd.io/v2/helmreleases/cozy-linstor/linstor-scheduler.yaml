apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  labels:
    cozystack.io/package: cozystack.linstor-scheduler
  name: linstor-scheduler
  namespace: cozy-linstor
spec:
  chartRef:
    kind: ExternalArtifact
    name: cozystack-linstor-scheduler-default-linstor-scheduler
    namespace: cozy-system
  dependsOn:
  - name: piraeus-operator-crds
    namespace: cozy-linstor
  - name: piraeus-operator
    namespace: cozy-linstor
  - name: linstor
    namespace: cozy-linstor
  - name: cert-manager-crds
    namespace: cozy-cert-manager
  - name: cert-manager
    namespace: cozy-cert-manager
  - name: cert-manager-issuers
    namespace: cozy-cert-manager
  install:
    remediation:
      retries: -1
    timeout: 10m0s
  interval: 5m0s
  upgrade:
    remediation:
      retries: -1
    timeout: 10m0s
  valuesFrom:
  - kind: Secret
    name: cozystack-values
