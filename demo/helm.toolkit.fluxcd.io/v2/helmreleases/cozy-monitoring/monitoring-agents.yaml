apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  labels:
    cozystack.io/package: cozystack.monitoring-agents
    cozystack.io/privileged: "true"
  name: monitoring-agents
  namespace: cozy-monitoring
spec:
  chartRef:
    kind: ExternalArtifact
    name: cozystack-monitoring-agents-default-monitoring-agents
    namespace: cozy-system
  dependsOn:
  - name: cilium
    namespace: cozy-cilium
  - name: cilium-networkpolicy
    namespace: cozy-cilium
  - name: kubeovn
    namespace: cozy-kubeovn
  - name: metrics-server
    namespace: cozy-monitoring
  - name: victoria-metrics-operator
    namespace: cozy-victoria-metrics-operator
  - name: vertical-pod-autoscaler-crds
    namespace: cozy-vertical-pod-autoscaler
  - name: vertical-pod-autoscaler
    namespace: cozy-vertical-pod-autoscaler
  install:
    remediation:
      retries: -1
    timeout: 10m0s
  interval: 5m0s
  upgrade:
    remediation:
      retries: -1
    timeout: 10m0s
  values:
    global:
      target: tenant-root
  valuesFrom:
  - kind: Secret
    name: cozystack-values
