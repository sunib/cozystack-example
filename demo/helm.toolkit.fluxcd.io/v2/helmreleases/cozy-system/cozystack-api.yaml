apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  labels:
    cozystack.io/package: cozystack.cozystack-engine
  name: cozystack-api
  namespace: cozy-system
spec:
  chartRef:
    kind: ExternalArtifact
    name: cozystack-cozystack-engine-default-cozystack-api
    namespace: cozy-system
  dependsOn:
  - name: cozystack-controller
    namespace: cozy-system
  - name: application-definition-crd
    namespace: cozy-system
  - name: cilium
    namespace: cozy-cilium
  - name: cilium-networkpolicy
    namespace: cozy-cilium
  - name: kubeovn
    namespace: cozy-kubeovn
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 30s
    timeout: 10m0s
  interval: 5m0s
  maxHistory: 5
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 30s
    timeout: 10m0s
  valuesFrom:
  - kind: Secret
    name: cozystack-values
