apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  labels:
    cozystack.io/package: cozystack.tenant-application
  name: tenant-rd
  namespace: cozy-system
spec:
  chartRef:
    kind: ExternalArtifact
    name: cozystack-tenant-application-default-tenant-rd
    namespace: cozy-system
  dependsOn:
  - name: cilium
    namespace: cozy-cilium
  - name: cilium-networkpolicy
    namespace: cozy-cilium
  - name: kubeovn
    namespace: cozy-kubeovn
  - name: ingress-rd
    namespace: cozy-system
  - name: seaweedfs-rd
    namespace: cozy-system
  - name: info-rd
    namespace: cozy-system
  - name: monitoring-rd
    namespace: cozy-system
  - name: etcd-rd
    namespace: cozy-system
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 30s
    timeout: 10m0s
  interval: 5m0s
  maxHistory: 5
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 30s
    timeout: 10m0s
  valuesFrom:
  - kind: Secret
    name: cozystack-values
