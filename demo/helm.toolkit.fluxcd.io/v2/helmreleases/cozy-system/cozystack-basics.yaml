apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  labels:
    cozystack.io/package: cozystack.cozystack-basics
  name: cozystack-basics
  namespace: cozy-system
spec:
  chartRef:
    kind: ExternalArtifact
    name: cozystack-cozystack-basics-default-cozystack-basics
    namespace: cozy-system
  dependsOn:
  - name: tenant-rd
    namespace: cozy-system
  install:
    remediation:
      retries: -1
    timeout: 10m0s
  interval: 5m0s
  upgrade:
    remediation:
      retries: -1
    timeout: 10m0s
  valuesFrom:
  - kind: Secret
    name: cozystack-values
