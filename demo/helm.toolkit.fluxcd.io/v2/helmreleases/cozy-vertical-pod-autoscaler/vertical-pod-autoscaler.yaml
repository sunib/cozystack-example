apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  labels:
    cozystack.io/package: cozystack.vertical-pod-autoscaler
    cozystack.io/privileged: "true"
  name: vertical-pod-autoscaler
  namespace: cozy-vertical-pod-autoscaler
spec:
  chartRef:
    kind: ExternalArtifact
    name: cozystack-vertical-pod-autoscaler-default-vertical-pod-autoscaler
    namespace: cozy-system
  dependsOn:
  - name: vertical-pod-autoscaler-crds
    namespace: cozy-vertical-pod-autoscaler
  - name: cilium
    namespace: cozy-cilium
  - name: cilium-networkpolicy
    namespace: cozy-cilium
  - name: kubeovn
    namespace: cozy-kubeovn
  install:
    remediation:
      retries: -1
    timeout: 10m0s
  interval: 5m0s
  upgrade:
    remediation:
      retries: -1
    timeout: 10m0s
  valuesFrom:
  - kind: Secret
    name: cozystack-values
