apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  labels:
    cozystack.io/package: cozystack.foundationdb-operator
  name: foundationdb-operator
  namespace: cozy-foundationdb-operator
spec:
  chartRef:
    kind: ExternalArtifact
    name: cozystack-foundationdb-operator-default-foundationdb-operator
    namespace: cozy-system
  dependsOn:
  - name: cilium
    namespace: cozy-cilium
  - name: cilium-networkpolicy
    namespace: cozy-cilium
  - name: kubeovn
    namespace: cozy-kubeovn
  - name: cert-manager-crds
    namespace: cozy-cert-manager
  - name: cert-manager
    namespace: cozy-cert-manager
  - name: cert-manager-issuers
    namespace: cozy-cert-manager
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 30s
    timeout: 10m0s
  interval: 5m0s
  maxHistory: 5
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 30s
    timeout: 10m0s
  valuesFrom:
  - kind: Secret
    name: cozystack-values
