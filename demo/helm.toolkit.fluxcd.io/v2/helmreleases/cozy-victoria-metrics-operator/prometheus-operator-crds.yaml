apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  labels:
    cozystack.io/package: cozystack.prometheus-operator-crds
  name: prometheus-operator-crds
  namespace: cozy-victoria-metrics-operator
spec:
  chartRef:
    kind: ExternalArtifact
    name: cozystack-prometheus-operator-crds-default-prometheus-operator-crds
    namespace: cozy-system
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 30s
    timeout: 10m0s
  interval: 5m0s
  maxHistory: 5
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 30s
    timeout: 10m0s
  valuesFrom:
  - kind: Secret
    name: cozystack-values
