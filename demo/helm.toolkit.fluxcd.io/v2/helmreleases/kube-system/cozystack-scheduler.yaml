apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  annotations:
    cozyhr.cozystack.io/values-files: values-linstor.yaml
  labels:
    cozystack.io/package: cozystack.cozystack-scheduler
  name: cozystack-scheduler
  namespace: kube-system
spec:
  chartRef:
    kind: ExternalArtifact
    name: cozystack-cozystack-scheduler-linstor-cozystack-scheduler
    namespace: cozy-system
  dependsOn:
  - name: linstor-scheduler
    namespace: cozy-linstor
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 30s
    timeout: 10m0s
  interval: 5m0s
  maxHistory: 5
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 30s
    timeout: 10m0s
  valuesFrom:
  - kind: Secret
    name: cozystack-values
