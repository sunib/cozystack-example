apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  labels:
    cozystack.io/package: cozystack.snapshot-controller
  name: snapshot-controller
  namespace: cozy-snapshot-controller
spec:
  chartRef:
    kind: ExternalArtifact
    name: cozystack-snapshot-controller-default-snapshot-controller
    namespace: cozy-system
  dependsOn:
  - name: cilium
    namespace: cozy-cilium
  - name: cilium-networkpolicy
    namespace: cozy-cilium
  - name: kubeovn
    namespace: cozy-kubeovn
  - name: cert-manager-crds
    namespace: cozy-cert-manager
  - name: cert-manager
    namespace: cozy-cert-manager
  - name: cert-manager-issuers
    namespace: cozy-cert-manager
  install:
    remediation:
      retries: -1
    timeout: 10m0s
  interval: 5m0s
  upgrade:
    remediation:
      retries: -1
    timeout: 10m0s
  valuesFrom:
  - kind: Secret
    name: cozystack-values
